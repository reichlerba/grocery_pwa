    Defines UI structure for buttons, list, etc.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f9ecc4">
    <title>Groceries</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@570;650;750&display=swap">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon-256.png">
</head>
<body>
    <div id="quick-add-bar"></div>

    <div id="main-list"></div>

    <div id="for-later-list"></div>

    <button id="theme-toggle">☾</button>
    <button id="add-button">+</button>

    <div id="gesture-hint">
        <span class="left-hint">⟸ Cambiar lista</span>
        <span class="right-hint">Quitar ⟹</span>
    </div>

    <div id="modal-overlay" class="hidden">

        <div id="add-modal">
            <h2>Agregar a la lista</h2>

            <input type="text" id="item-input" placeholder="Nombre de producto">

            <div id="category-selector">
                <button class="category-button selected"
                    data-category="Frescos">
                    Frescos
                </button>

                <button class="category-button"
                    data-category="Pan">
                    Pan
                </button>

                <button class="category-button"
                    data-category="Ingredientes">
                    Ingredientes
                </button>

                <button class="category-button"
                    data-category="Carne">
                    Carne
                </button>

                <button class="category-button"
                    data-category="Lácteos">
                    Lácteos
                </button>

                <button class="category-button"
                    data-category="Congelados">
                    Congelados
                </button>

                <button class="category-button"
                    data-category="Otro">
                    Otro
                </button>
            </div>

            <label>
                <input type="checkbox" id="for-later-checkbox">
                Para más tarde
            </label>
            <label>
                <input type="checkbox" id="quick-checkbox">
                Agregar a la barra perezosa
            </label>

            <div class="modal-buttons">
                <button id="submit-itemAdd">Aceptar</button>
                <button id="cancel-itemAdd">Cancelar</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
